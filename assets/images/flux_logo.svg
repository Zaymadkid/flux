<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#F7C59F"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF3E36"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="#1a1a2e" stroke="#FF6B35" stroke-width="4"/>
  <!-- Anvil / Forge icon -->
  <path d="M120 280 L280 280 L280 260 L260 250 L260 220 L240 210 L240 190
           L200 170 L160 190 L160 210 L140 220 L140 250 L120 260 Z"
        fill="url(#g1)" opacity="0.9"/>
  <!-- Spark / Flame going up -->
  <path d="M200 170 Q210 140 200 110 Q190 80 200 50"
        fill="none" stroke="url(#g2)" stroke-width="6" stroke-linecap="round"/>
  <circle cx="200" cy="50" r="12" fill="#EF3E36" opacity="0.9"/>
  <circle cx="200" cy="50" r="6" fill="#FFD166" opacity="0.9"/>
  <!-- Small sparks -->
  <circle cx="170" cy="90" r="4" fill="#FFD166" opacity="0.7"/>
  <circle cx="230" cy="95" r="3" fill="#FFD166" opacity="0.5"/>
  <circle cx="185" cy="70" r="3" fill="#FF6B35" opacity="0.6"/>
  <circle cx="220" cy="75" r="4" fill="#FF6B35" opacity="0.7"/>
  <!-- Baseline -->
  <path d="M120 280 L280 280" stroke="url(#g2)" stroke-width="5" stroke-linecap="round"/>
  <!-- FLUX text -->
  <text x="200" y="345" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="72" font-weight="800" text-anchor="middle" fill="#FFF" letter-spacing="8">FLUX</text>
  <text x="200" y="370" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="300" text-anchor="middle" fill="#FF6B35" letter-spacing="6">MOBILE SECURITY FORGE</text>
